name: Java CI with Gradle

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4

  - name: Set up JDK 11
    uses: actions/setup-java@v3
    with:
      java-version: '11'
      distribution: 'temurin'

  - name: Grant execute permission for gradlew
    run: chmod +x gradlew

  - name: Start SUT
    run: |
      nohup java -jar ./artifacts/app-replan-delivery.jar > server.log 2>&1 &
      echo "Waiting for application to start on http://localhost:9999 ..."
      for i in $(seq 1 60); do
        if curl -sSf http://localhost:9999 > /dev/null; then
          echo "Application is up!"
          break
        fi
        echo "Waiting... ($i)"
        sleep 1
      done
      # fail if still not available
      curl -sSf http://localhost:9999 || (echo "SUT did not start in time" && cat server.log && exit 1)

  - name: Run tests
    run: ./gradlew test -Dselenide.headless=true --info